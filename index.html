<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  gtag('config', 'G-GQJ9QJ7C78');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ben Miosky</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Libre+Baskerville:ital@1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --off: #161616;
      --light: #f2ede6;
      --mid: #6b6560;
      --blue: #3d6bce;
      --blue-dim: rgba(61,107,206,0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Syne', sans-serif;
    }

    .layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left panel */
    .left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3.5rem;
      background: var(--off);
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    /* Large background initial */
    .bg-letter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-55%, -50%);
      font-size: 42vw;
      font-weight: 800;
      color: transparent;
      -webkit-text-stroke: 1px rgba(242,237,230,0.04);
      line-height: 1;
      user-select: none;
      pointer-events: none;
      letter-spacing: -0.05em;
    }

    /* Thin vertical line accent */
    .v-line {
      position: absolute;
      top: 3.5rem;
      left: 3.5rem;
      width: 1px;
      height: 0;
      background: var(--blue);
      animation: growDown 0.8s ease 0.7s forwards;
    }

    .left-content {
      position: relative;
      z-index: 2;
    }

    .first-name {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: clamp(2rem, 5vw, 3.8rem);
      color: rgba(242,237,230,0.35);
      display: block;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    .last-name {
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 800;
      color: var(--light);
      display: block;
      letter-spacing: -0.03em;
      line-height: 0.95;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.65s forwards;
    }

    .left-footer {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 1s forwards;
    }

    .blue-pill {
      background: var(--blue-dim);
      border: 1px solid rgba(61,107,206,0.3);
      color: #7fa3e8;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
    }

    /* Right panel */
    .right {
      position: relative;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3.5rem;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.3s forwards;
    }

    .right-top {
      display: flex;
      justify-content: flex-end;
    }

    .monogram {
      width: 52px;
      height: 44px;
      border: 1px solid rgba(242,237,230,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(242,237,230,0.3);
      opacity: 0;
      animation: fadeIn 0.8s ease 0.8s forwards;
    }

    .contact-btn {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7fa3e8;
      text-decoration: none;
      border: 1px solid rgba(61,107,206,0.35);
      padding: 0.65rem 1.4rem;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .contact-btn:hover {
      background: var(--blue-dim);
      border-color: rgba(61,107,206,0.7);
      color: #a8c4f0;
    }

    /* Center graphic */
    .right-center {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      position: relative;
    }

    .graphic {
      position: relative;
      width: 220px;
      height: 220px;
      opacity: 0;
      animation: scaleIn 1s ease 0.6s forwards;
    }

    .graphic-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(242,237,230,0.07);
    }

    .ring-1 { inset: 0; }
    .ring-2 { inset: 30px; border-color: rgba(61,107,206,0.2); }
    .ring-3 { inset: 60px; border-color: rgba(242,237,230,0.04); }

    .graphic-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 12px var(--blue-dim);
    }

    /* Orbit dot */
    .orbit-dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 100%;
      height: 100%;
      margin-top: -50%;
      margin-left: -50%;
      animation: orbit 6s linear infinite;
    }

    .orbit-dot::before {
      content: '';
      position: absolute;
      top: -4px; left: 50%;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(61,107,206,0.7);
      transform: translateX(-50%);
    }

    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Right bottom */
    .right-bottom {
      opacity: 0;
      animation: fadeIn 0.8s ease 1.1s forwards;
    }

    .label {
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 400;
      color: rgba(242,237,230,0.4);
      line-height: 1.6;
      max-width: 220px;
    }

    /* Divider line between panels */
    .divider {
      position: fixed;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(242,237,230,0.06) 30%, rgba(242,237,230,0.06) 70%, transparent);
      pointer-events: none;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes growDown {
      from { height: 0; }
      to   { height: calc(100% - 7rem); }
    }

    /* Mobile */
    @media (max-width: 650px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .right { display: none; }
      .left { justify-content: center; padding: 2.5rem; }
      .v-line { display: none; }
    }
  </style>
</head>
<body>

  <div class="divider"></div>

  <div class="layout">

    <div class="left">
      <div class="bg-letter">B</div>
      <div class="v-line"></div>
      <div class="left-content">
        <span class="first-name">Ben</span>
        <span class="last-name">Miosky</span>
        <div class="left-footer">
          <div class="blue-pill">Portfolio</div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="right-top">
        <div class="monogram">BPM</div>
      </div>

      <div class="right-center">
        <div class="graphic">
          <div class="graphic-ring ring-1"></div>
          <div class="graphic-ring ring-2"></div>
          <div class="graphic-ring ring-3"></div>
          <div class="graphic-dot"></div>
          <div class="orbit-dot"></div>
        </div>
      </div>

      <div class="right-bottom">
        <a href="mailto:bmiosky@gmail.com" class="contact-btn">Get in touch</a>
      </div>
    </div>

  </div>

</body>
</html>
